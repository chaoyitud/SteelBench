# TabPFN v3 fine-tuning — TUNED config (open_tata → outo direction)
# LR chosen from sweep: 1e-6 gives A1=-4.2% vs ZS; A3=+6.9% (OK, <10% threshold)
# tabpfn2_talent_ft uses 5e-6 (via --override_lr in run commands)
# Generated by Agent_lr.md LR sweep pipeline

model_name: "TabPFNv26"
task_type: "regression"
tuning_strategy: "finetune"

finetune_mode: "native"
device: "cuda"
epochs: 30
steps_per_epoch: 100
support_size: 512
query_size: 128
learning_rate: 1.0e-6   # tuned for tabpfn3_ft; tabpfn2_talent_ft uses 5e-6
lr: 1.0e-6              # synced with learning_rate
weight_decay: 0.01
clip_grad_norm: 1.0
grad_clip_value: 1.0
early_stopping: true
early_stopping_patience: 8
validation_split_ratio: 0.1
n_finetune_ctx_plus_query_samples: 10000
finetune_ctx_query_split_ratio: 0.2
n_estimators_finetune: 2
n_estimators_validation: 2
n_estimators_final_inference: 8
use_lr_scheduler: true
use_lr_schedule: false
use_activation_checkpointing: true
random_state: 0
seed: 0
show_progress: true
