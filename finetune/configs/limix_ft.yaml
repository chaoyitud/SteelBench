# LimiX regression fine-tuning hyperparameters
# Referenced by run_finetune_benchmark.py --config finetune/configs/limix_ft.yaml
# Fine-tuning method: _finetune_limix_regression() in TabTune TuningManager
# Defaults confirmed from TabTune tuning.py source code

model_name: "Limix"
task_type: "regression"
tuning_strategy: "finetune"

device: "cuda"
epochs: 3               # TabTune default: 3
steps_per_epoch: 100    # TabTune default: 100
support_size: 256       # TabTune default: 256
query_size: 64          # TabTune default: 64
lr: 1.0e-5              # TabTune default: 1e-5
weight_decay: 0.01      # TabTune default: 0.01
clip_grad_norm: 1.0     # TabTune default: 1.0
n_estimators: 8         # LimixRegressorWrapper default: 8
seed: 0
show_progress: true

# Sweep grid — used when run_finetune_benchmark.py --sweep is passed
sweep:
  lr: [1.0e-6, 5.0e-6, 1.0e-5, 5.0e-5, 1.0e-4]
  epochs: [1, 3, 5]
  support_size: [128, 256, 512]
