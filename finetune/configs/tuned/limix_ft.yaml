# LimiX regression fine-tuning — TUNED config (open_tata → outo direction)
# LR chosen from sweep: 5e-8 gives A1=-2.4% vs ZS; A3 plateaued at +11.5% (floor)
# Generated by Agent_lr.md LR sweep pipeline

model_name: "Limix"
task_type: "regression"
tuning_strategy: "finetune"

device: "cuda"
epochs: 3               # TabTune default: 3
steps_per_epoch: 100    # TabTune default: 100
support_size: 256       # TabTune default: 256
query_size: 64          # TabTune default: 64
lr: 5.0e-8              # tuned: 200x lower than default 1e-5; A3 floor reached
weight_decay: 0.01      # TabTune default: 0.01
clip_grad_norm: 1.0     # TabTune default: 1.0
n_estimators: 8         # LimixRegressorWrapper default: 8
use_lr_schedule: true   # cosine warmup schedule in TuningManager
seed: 0
show_progress: true
